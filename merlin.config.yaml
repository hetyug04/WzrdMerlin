    model_path: /models/Mistral-7B-Instruct-v0.3-Q5_K_M.gguf
    model_name: mistral:7b
    context_window: 8192
    gpu_layers: 99
    kv_cache_type_k: q8_0
    kv_cache_type_v: q8_0
    think: false
    think_budget: 0
