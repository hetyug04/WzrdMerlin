# ── Inference Engine ──────────────────────────────────────────────────────────

inference:
  backend: ollama             # llama-server | ollama
  server_path: llama-server   # path to llama-server binary
  port: 8081                  # base port (additional models get port+1, +2, ...)
  max_active_models: 1        # LRU eviction when over this limit
  mmap: true                  # false = --no-mmap (reduces GTT spill risk)
  gtt_threshold: 85.0         # % system RAM before GTT spill eviction
  idle_timeout_minutes: 15    # evict model after this many idle minutes
  busy_timeout_minutes: 10    # kill hung model after this many minutes
  disaggregate: false         # dual-backend: ROCm prefill / Vulkan decode
  prefill_token_threshold: 2048  # prompt tokens above this → ROCm backend

# ── Ollama Fallback ───────────────────────────────────────────────────────────

ollama:
  base_url: http://host.docker.internal:11434

# ── AMD GPU Hardware ──────────────────────────────────────────────────────────
# Tuned for RX 6750 XT (Navi 22 / gfx1031)

hardware:
  hsa_override_gfx_version: "10.3.0"   # gfx1031 → pretend gfx1030 for ROCm
  radv_perftest: nogttspill              # prevent uncontrolled GTT spilling
