# WzrdMerlin v2 — Model Configuration
#
# To switch the active model: change `active_model` to any profile name below,
# or set the MERLIN_MODEL environment variable (env var takes precedence).
#
# Runtime switch via API: POST /api/models/switch?model_name=<profile>
# List available models:  GET  /api/models

active_model: merlin-brain

# ── Model Profiles ────────────────────────────────────────────────────────────
# Add new profiles here to make them available for switching.

models:
  qwen3.5:9b:
    model_path: /models/Qwen3.5:9B-Instruct-Q4_K_M.gguf
    model_name: qwen3.5:9b
    context_window: 32768
    gpu_layers: 99
    kv_cache_type_k: q8_0
    kv_cache_type_v: q8_0
    think: true
    think_budget: 4096
    temperature: 0.3

  merlin-brain:
    model_path: 'C:\Users\Het\.ollama\models\manifests\registry.ollama.ai\jackruong\Qwen3.5-9B.Q4_K_M.gguf'
    model_name: merlin-model:latest
    context_window: 32768
    gpu_layers: 99
    kv_cache_type_k: q8_0
    kv_cache_type_v: q8_0
    think: false
    think_budget: 0
    temperature: 0.3

  qwen3.5-14b:
    model_path: /models/Qwen3.5-14B-Instruct-Q4_K_M.gguf
    model_name: qwen3.5:14b
    context_window: 4096
    gpu_layers: 80
    kv_cache_type_k: q4_0
    kv_cache_type_v: q4_0
