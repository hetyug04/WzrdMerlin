services:
  nats:
    image: nats:2.10
    command: ["-js"] # Enable JetStream
    ports:
      - "4222:4222"
      - "8222:8222" # NATS management port
    volumes:
      - nats-data:/data
    restart: always

  core:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NATS_URL=nats://nats:4222
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_THINK=false
      - OLLAMA_THINK_BUDGET=0
      - MERLIN_WORKSPACE=/workspace
    volumes:
      - ./src:/app/src
      - merlin-workspace:/workspace
    depends_on:
      - nats
    # Use host.docker.internal to access Ollama on Windows host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  dashboard:
    build: 
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./dashboard/src:/app/src
      - ./dashboard/public:/app/public
      - ./dashboard/src-tauri:/app/src-tauri
    depends_on:
      - core
    restart: unless-stopped

  sidecar:
    build:
      context: "./src/sidecar"
      dockerfile: Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats
    restart: unless-stopped

volumes:
  nats-data:
  merlin-workspace:
